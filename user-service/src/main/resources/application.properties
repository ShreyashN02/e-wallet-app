server.port=8081
spring.application.name=user-service

# ===== MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/ewallet_user_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
# 256-bit base64 secret - change this in production and keep it identical
# across user-service / wallet-service / transaction-service so tokens validate everywhere
jwt.secret=4a6e7c2f8b1d9e3a5c7f0b2d4e6a8c1f3b5d7e9a0c2f4b6d8e1a3c5f7b9d0e2a
jwt.expiration-ms=86400000

# ===== Logging =====
logging.level.com.ewallet=INFO
logging.level.org.springframework.security=INFO

# ===== springdoc =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

management.endpoints.web.exposure.include=health,info
