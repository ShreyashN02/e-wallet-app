# Optional convenience file. You said you already have MySQL and Kafka
# running locally, so you likely won't need this — but if you ever want
# a clean, disposable environment instead (e.g. on a new machine), run:
#
#   docker compose up -d
#
# This starts MySQL on localhost:3306 (root password: root) and Kafka
# (KRaft mode, no Zookeeper, official Apache image) on localhost:9092 —
# matching the defaults in each service's application.properties.

services:
  mysql:
    image: mysql:8
    container_name: ewallet-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  kafka:
    image: apache/kafka:3.7.0
    container_name: ewallet-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data

volumes:
  mysql-data:
  kafka-data: