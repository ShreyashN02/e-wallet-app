server.port=8082
spring.application.name=wallet-service

# ===== MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/ewallet_wallet_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT (must match user-service secret) =====
jwt.secret=4a6e7c2f8b1d9e3a5c7f0b2d4e6a8c1f3b5d7e9a0c2f4b6d8e1a3c5f7b9d0e2a
jwt.expiration-ms=86400000

# ===== Kafka =====
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
kafka.topic.transaction-events=transaction-events

# ===== Downstream service URLs =====
services.user-service.url=http://localhost:8081

# ===== Logging =====
logging.level.com.ewallet=INFO

# ===== springdoc =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

management.endpoints.web.exposure.include=health,info
