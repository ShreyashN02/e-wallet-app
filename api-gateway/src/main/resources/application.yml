server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "http://localhost:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/users/**
        - id: wallet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/wallet/**
        - id: transaction-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/transactions/**

logging:
  level:
    org.springframework.cloud.gateway: INFO
